<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Desktop - Instanced UI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background-color: #1a1a2e; color: #e0e0e0; }
        canvas { display: block; }
        .controls-container {
            position: absolute; top: 10px; left: 10px;
            background-color: rgba(0, 0, 0, 0.7); padding: 15px;
            border-radius: 12px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            display: flex; flex-direction: column; gap: 10px;
        }
        .control-group { display: flex; align-items: center; gap: 10px; }
        .control-group label { font-size: 0.9em; color: #b0b0b0; }
        .control-group input[type="range"] {
            width: 150px; height: 8px; background: #444;
            outline: none; border-radius: 5px; cursor: pointer;
        }
        .control-group input[type="range"]::-webkit-slider-thumb,
        .control-group input[type="range"]::-moz-range-thumb {
            width: 18px; height: 18px; border-radius: 50%;
            background: #64ffda; cursor: pointer;
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        .user-id-display {
            position: absolute; bottom: 10px; right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 15px; border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            font-size: 0.8em; color: #b0b0b0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px;
        }
        .message-box {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 0, 0, 0.8); color: white;
            padding: 20px; border-radius: 10px; display: none; z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div class="controls-container">
        <div class="control-group">
            <label for="rotationSpeed">Dönüş Hızı:</label>
            <input type="range" id="rotationSpeed" min="0" max="0.05" step="0.0001" value="0.005">
        </div>
        <div class="control-group">
            <label for="scaleFactor">Ölçeklendirme Faktörü:</label>
            <input type="range" id="scaleFactor" min="0.5" max="2.0" step="0.01" value="1.0">
        </div>
    </div>
    <div id="userIdDisplay" class="user-id-display">Firebase devre dışı (demo)</div>
    <div id="messageBox" class="message-box"></div>
    <script>
        let scene, camera, renderer, mesh;
        let controls = { rotationSpeed: 0.005, scaleFactor: 1.0 };
        const rotationInput = document.getElementById("rotationSpeed");
        const scaleInput = document.getElementById("scaleFactor");

        rotationInput.addEventListener("input", () => controls.rotationSpeed = parseFloat(rotationInput.value));
        scaleInput.addEventListener("input", () => controls.scaleFactor = parseFloat(scaleInput.value));

        initThree();
        animate();

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 20;
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById("container").appendChild(renderer.domElement);

            const geometry = new THREE.BoxGeometry();
            const material = new THREE.MeshStandardMaterial({ color: 0x00ffaa });
            mesh = new THREE.InstancedMesh(geometry, material, 100);
            const dummy = new THREE.Object3D();

            for (let i = 0; i < 100; i++) {
                dummy.position.set(Math.random() * 20 - 10, Math.random() * 20 - 10, Math.random() * 20 - 10);
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
            }
            scene.add(mesh);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 1, 1);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));
        }

        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.y += controls.rotationSpeed;
            mesh.scale.set(controls.scaleFactor, controls.scaleFactor, controls.scaleFactor);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
