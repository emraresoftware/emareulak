<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emare Ulak - Yönetim Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            color: #1a73e8;
            font-size: 2.5em;
            font-weight: 300;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 3em;
            font-weight: bold;
            color: #1a73e8;
            display: block;
        }

        .stat-label {
            color: #666;
            margin-top: 10px;
            font-size: 1.1em;
        }

        .data-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            margin: 20px 0;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .data-item {
            background: #f8f9fa;
            border-left: 4px solid #1a73e8;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .data-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(26, 115, 232, 0.2);
        }

        .data-item h3 {
            color: #1a73e8;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .data-item p {
            margin: 5px 0;
            line-height: 1.6;
        }

        .data-item a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }

        .data-item a:hover {
            text-decoration: underline;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .chart-container {
            height: 400px;
            margin: 30px 0;
            background: white;
            border-radius: 15px;
            padding: 20px;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }

        .timestamp {
            color: #666;
            font-size: 0.9em;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>🚀 Emare Ulak Yönetim Paneli</h1>
        </div>
    </div>

    <div class="container">
        <div id="connection-status" class="status disconnected">
            WebSocket bağlantısı kuruluyor...
        </div>

        <div class="stats">
            <div class="stat-card">
                <span id="total-pages" class="stat-number">0</span>
                <div class="stat-label">Toplanan Sayfa</div>
            </div>
            <div class="stat-card">
                <span id="active-connections" class="stat-number">0</span>
                <div class="stat-label">Aktif Bağlantı</div>
            </div>
            <div class="stat-card">
                <span id="data-size" class="stat-number">0</span>
                <div class="stat-label">Veri Boyutu (KB)</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="activityChart"></canvas>
        </div>

        <div class="data-section">
            <h2>📊 Son Toplanan Veriler</h2>
            <div id="data-list">
                <div class="loading">Veriler yükleniyor...</div>
            </div>
        </div>
    </div>

    <script>
        class DashboardManager {
            constructor() {
                this.ws = null;
                this.data = [];
                this.chart = null;
                this.init();
            }

            init() {
                this.connectWebSocket();
                this.loadInitialData();
                this.setupChart();
                this.updateStats();
            }

            connectWebSocket() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}`;
                
                this.ws = new WebSocket(wsUrl);
                
                this.ws.onopen = () => {
                    this.updateConnectionStatus(true);
                    console.log('WebSocket bağlantısı kuruldu');
                };

                this.ws.onmessage = (event) => {
                    const message = JSON.parse(event.data);
                    this.handleWebSocketMessage(message);
                };

                this.ws.onclose = () => {
                    this.updateConnectionStatus(false);
                    console.log('WebSocket bağlantısı koptu, yeniden bağlanılıyor...');
                    setTimeout(() => this.connectWebSocket(), 3000);
                };

                this.ws.onerror = (error) => {
                    console.error('WebSocket hatası:', error);
                };
            }

            handleWebSocketMessage(message) {
                switch (message.type) {
                    case 'INITIAL_DATA':
                        this.data = message.data || [];
                        this.updateUI();
                        break;
                    case 'NEW_PAGE_DATA':
                        this.data.unshift(message.data);
                        if (this.data.length > 50) {
                            this.data = this.data.slice(0, 50);
                        }
                        this.updateUI();
                        break;
                }
            }

            async loadInitialData() {
                try {
                    const response = await fetch('/api/data?limit=20');
                    if (response.ok) {
                        this.data = await response.json();
                        this.updateUI();
                    }
                } catch (error) {
                    console.error('Veri yüklenirken hata:', error);
                }
            }

            updateConnectionStatus(connected) {
                const status = document.getElementById('connection-status');
                if (connected) {
                    status.className = 'status connected';
                    status.textContent = '✅ WebSocket bağlantısı aktif';
                } else {
                    status.className = 'status disconnected';
                    status.textContent = '❌ WebSocket bağlantısı kopuk';
                }
            }

            updateUI() {
                this.updateStats();
                this.updateDataList();
                this.updateChart();
            }

            updateStats() {
                document.getElementById('total-pages').textContent = this.data.length;
                
                // Veri boyutunu hesapla (KB)
                const dataSize = (JSON.stringify(this.data).length / 1024).toFixed(1);
                document.getElementById('data-size').textContent = dataSize;
            }

            updateDataList() {
                const container = document.getElementById('data-list');
                
                if (this.data.length === 0) {
                    container.innerHTML = '<div class="loading">Henüz veri yok</div>';
                    return;
                }

                container.innerHTML = this.data.slice(0, 10).map(item => `
                    <div class="data-item">
                        <h3>${item.pageInfo?.title || 'Başlıksız Sayfa'}</h3>
                        <p><strong>URL:</strong> <a href="${item.pageInfo?.url}" target="_blank">${item.pageInfo?.url}</a></p>
                        <p><strong>Metin:</strong> ${item.text?.length || 0} karakter</p>
                        <p><strong>Bağlantı:</strong> ${item.links?.length || 0} adet</p>
                        <p><strong>Görsel:</strong> ${item.images?.length || 0} adet</p>
                        <p class="timestamp">📅 ${new Date(item.timestamp).toLocaleString('tr-TR')}</p>
                    </div>
                `).join('');
            }

            setupChart() {
                const ctx = document.getElementById('activityChart').getContext('2d');
                this.chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            label: 'Sayfa Ziyaretleri',
                            data: [],
                            borderColor: '#1a73e8',
                            backgroundColor: 'rgba(26, 115, 232, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: 'Son 24 Saat Aktivite'
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            }

            updateChart() {
                if (!this.chart || this.data.length === 0) return;

                // Son 24 saati saatlik dilimler halinde grupla
                const hours = [];
                const counts = [];
                const now = new Date();
                
                for (let i = 23; i >= 0; i--) {
                    const hour = new Date(now.getTime() - i * 60 * 60 * 1000);
                    hours.push(hour.getHours().toString().padStart(2, '0') + ':00');
                    
                    const count = this.data.filter(item => {
                        const itemTime = new Date(item.timestamp);
                        return itemTime.getHours() === hour.getHours() && 
                               itemTime.getDate() === hour.getDate();
                    }).length;
                    
                    counts.push(count);
                }

                this.chart.data.labels = hours;
                this.chart.data.datasets[0].data = counts;
                this.chart.update();
            }
        }

        // Dashboard'u başlat
        document.addEventListener('DOMContentLoaded', () => {
            new DashboardManager();
        });
    </script>
</body>
</html>
